name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate manifests and contracts
        run: python3 bin/killhouse_validate.py --check-whitespace

      - name: Lint (ruff)
        run: pipx run ruff check bin tests

      - name: Type-check (mypy)
        run: pipx run mypy bin tests

      - name: Run unit tests
        run: python3 -m unittest discover tests

      - name: Run readonly evals (static scenarios)
        run: python3 evals/run_readonly.py evals/killhouse-routing.json

      - name: Validate JSON (manifests)
        run: |
          python3 -m json.tool plugin.json > /dev/null
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool .codex-plugin/plugin.json > /dev/null
          python3 -m json.tool .killhouse/config.example.json > /dev/null

      - name: Validate Claude plugin manifest (Anthropic loader)
        run: |
          npm install -g @anthropic-ai/claude-code --quiet
          claude plugin validate .
